<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>K-League Interactive Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { margin: 0; background: #020617; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* 1. 지도 영역 */
        #map-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        svg { width: 80%; height: 80%; transition: filter 0.5s; }
        
        /* 지도 인터랙션 */
        .region { fill: #334155; stroke: #94a3b8; cursor: pointer; transition: 0.3s; }
        .region:hover { fill: #38bdf8; transform: scale(1.05); }
        .blur-all .region { filter: blur(5px); opacity: 0.3; }
        .blur-all .region.active { filter: blur(0); opacity: 1; transform: scale(1.2); }

        /* 2. 상세 정보 패널 */
        #panel { width: 350px; background: #1e293b; padding: 20px; border-left: 1px solid #334155; overflow-y: auto; }
        .team-item { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; cursor: pointer; padding: 10px; background: #0f172a; border-radius: 8px; }
        .team-item:hover { background: #38bdf8; color: black; }
    </style>
</head>
<body>

<div id="map-container">
    <svg id="korea-map" viewBox="0 0 500 800">
        <path id="서울" class="region" d="..." />
        <path id="경기" class="region" d="..." />
        <path id="영남" class="region" d="..." />
    </svg>
</div>

<div id="panel">
    <h2 id="region-title">지역을 선택하세요</h2>
    <div id="team-list"></div>
</div>

<script>
    const csvUrl = '당신의_CSV_게시_링크';
    let teamData = [];

    // 데이터 로드
    Papa.parse(csvUrl, { download: true, header: true, complete: (res) => { teamData = res.data; } });

    // 지역 클릭 이벤트
    document.querySelectorAll('.region').forEach(region => {
        region.addEventListener('click', function() {
            // 1. 시각 효과: 블러 처리
            document.getElementById('korea-map').classList.add('blur-all');
            document.querySelectorAll('.region').forEach(r => r.classList.remove('active'));
            this.classList.add('active');

            // 2. 정보 출력
            const regionName = this.id;
            document.getElementById('region-title').innerText = regionName;
            const teams = teamData.filter(t => t.지역 === regionName);
            
            const list = document.getElementById('team-list');
            list.innerHTML = teams.map(t => `
                <div class="team-item" onclick="alert('${t.특징}')">
                    <img src="${t.로고이미지URL}" width="40">
                    <span>${t.팀명}</span>
                </div>
            `).join('');
        });
    });
</script>
</body>
</html>
