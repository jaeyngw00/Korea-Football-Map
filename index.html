<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>K-League Interactive Map</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* 밝고 세련된 배경 디자인 */
        body { 
            margin: 0; 
            background-color: #f3f4f6; /* 밝은 회색 배경 */
            color: #1f2937; 
            font-family: 'Pretendard', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        #map-area { flex: 1; display: flex; align-items: center; justify-content: center; }

        /* 지도 인터랙션 */
        .region { 
            fill: #d1d5db; /* 기본 회색 */
            stroke: #ffffff; 
            stroke-width: 1px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        
        /* 마우스 호버 시 색상 변화 */
        .region:hover { fill: #38bdf8; transform: translateY(-5px); }

        /* 클릭 시 나머지 지역 블러/축소 */
        .blur-all .region { filter: blur(4px) grayscale(0.5); opacity: 0.4; transform: scale(1); }
        .blur-all .region.active { filter: blur(0) grayscale(0); opacity: 1; transform: scale(1.1); fill: #0284c7; }

        /* 상세 정보 패널 */
        #panel { 
            width: 380px; 
            background: #ffffff; 
            padding: 40px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            overflow-y: auto; 
        }
        
        h2 { font-weight: 800; letter-spacing: -0.5px; }
        .team-item { 
            display: flex; align-items: center; gap: 15px; 
            margin-bottom: 20px; padding: 15px; 
            background: #f9fafb; border-radius: 12px;
            transition: 0.3s; cursor: pointer; border: 1px solid #e5e7eb;
        }
        .team-item:hover { background: #eff6ff; border-color: #bfdbfe; }
    </style>
</head>
<body>

<div id="map-area">
    <svg id="korea-map" viewBox="0 0 1733.57 1672.44" style="max-width: 600px;">
        </svg>
</div>

<div id="panel">
    <h2 id="region-title">지역을 선택하세요</h2>
    <div id="team-list">지도의 지역을 클릭하면 구단 정보가 나타납니다.</div>
</div>

<script>
    // 클릭 이벤트 로직
    document.querySelectorAll('.region').forEach(region => {
        region.addEventListener('click', function() {
            document.getElementById('korea-map').classList.add('blur-all');
            document.querySelectorAll('.region').forEach(r => r.classList.remove('active'));
            this.classList.add('active');
            
            // 데이터 출력 로직 (구글 시트 연동 시 활용)
            document.getElementById('region-title').innerText = this.id + " 구단 정보";
        });
    });
</script>
</body>
</html>
