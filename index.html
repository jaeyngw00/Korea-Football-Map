<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        /* 지역별 기본 스타일 */
        .region { fill: #d1d5db; stroke: #fff; cursor: pointer; transition: 0.3s; }
        
        /* 마우스 올리면 색 변함 */
        .region:hover { fill: #38bdf8; }
        
        /* 클릭하면 커짐 */
        .active { transform: scale(1.1); fill: #0284c7 !important; }
    </style>
</head>
<body>

    <svg id="korea-map" viewBox="0 0 1733.57 1672.44" style="width: 600px; border: 1px solid red;">
        <g id="Jeju" class="region">
            <path d="..." /> 
        </g>
    </svg>

    <script>
        // 클릭하면 active 클래스를 붙여서 동작 확인
        document.querySelectorAll('.region').forEach(region => {
            region.addEventListener('click', function() {
                document.querySelectorAll('.region').forEach(r => r.classList.remove('active'));
                this.classList.add('active');
                alert(this.id + " 지역을 클릭했습니다!");
            });
        });
    </script>
</body>
</html>
